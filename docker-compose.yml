services:
  postgres:
    image: postgres:16-alpine
    container_name: zuvelio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: zuvelio@2026
      POSTGRES_DB: teamzuvelioDB
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d teamzuvelioDB" ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zuvelio-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:zuvelio%402026@postgres:5432/teamzuvelioDB
      JWT_SECRET: ${JWT_SECRET:-change-me-local-jwt-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-local-refresh-secret}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:4200}
    ports:
      - "3000:3000"

volumes:
  postgres_data:
